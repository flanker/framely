<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css">
<style>
body { width: 1280px; height: 800px; background: linear-gradient(135deg, #f8fafc 0%, #eef1f7 100%); flex-direction: column; padding: 56px 80px; justify-content: flex-start; }
.headline { font-size: 56px; font-weight: 800; letter-spacing: -1.5px; color: #0f172a; line-height: 1.05; max-width: 1100px; text-align: center; align-self: center; }
.headline em { font-style: normal; background: linear-gradient(135deg, #86efac, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
.sub { margin-top: 14px; font-size: 20px; color: #475569; max-width: 720px; line-height: 1.4; font-weight: 500; text-align: center; align-self: center; }
.compare { margin-top: 50px; align-self: center; display: flex; gap: 56px; align-items: stretch; position: relative; }
.side { width: 460px; display: flex; flex-direction: column; align-items: center; }
.side-tag { padding: 7px 16px; border-radius: 999px; font-size: 12px; font-weight: 800; letter-spacing: 1.2px; }
.tag-before { background: #fee2e2; color: #b91c1c; }
.tag-after { background: linear-gradient(135deg, #86efac, #c084fc); color: #0f172a; }
.canvas { margin-top: 18px; width: 100%; height: 380px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.canvas-before { background: #cbd5e1; padding: 0; }
.canvas-after { padding: 26px; box-shadow: 0 16px 40px rgba(0,0,0,0.18); }
.canvas-before .raw { width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; }
.canvas-before .raw-chrome { height: 32px; background: #d4d8de; display: flex; align-items: center; padding: 0 14px; gap: 6px; }
.canvas-before .raw-dot { width: 10px; height: 10px; border-radius: 50%; background: #94a3b8; }
.canvas-before .raw-content { padding: 22px 28px; display: flex; flex-direction: column; flex: 1; }
.raw-line { height: 12px; border-radius: 5px; background: #e2e8f0; margin-bottom: 10px; }
.raw-line.s { width: 35%; height: 18px; background: #cbd5e1; margin-bottom: 16px; }
.raw-line.l { width: 100%; }
.raw-line.m { width: 70%; }
.canvas-after .frame { width: 100%; height: 100%; }
.canvas-after .after-content { padding: 22px 28px; display: flex; flex-direction: column; flex: 1; }
.arrow { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 64px; height: 64px; border-radius: 50%; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 12px 28px rgba(0,0,0,0.25); z-index: 5; }
.logo-wrap { position: absolute; top: 32px; left: 80px; display: flex; align-items: center; gap: 10px; }
.logo-wrap img { width: 36px; height: 36px; border-radius: 9px; box-shadow: 0 6px 14px rgba(59,130,246,0.2); }
.logo-wrap .n { font-weight: 800; font-size: 19px; color: #0f172a; letter-spacing: -0.5px; }
.tagline { margin-top: 36px; font-size: 17px; color: #64748b; align-self: center; font-weight: 500; }
.tagline b { color: #0f172a; font-weight: 800; }
</style></head>
<body>
  <div class="logo-wrap"><img src="icon.png"><span class="n">Framely</span></div>
  <div class="headline">Same screenshot. <em>Whole new vibe.</em></div>
  <div class="sub">Raw screenshots look amateur. Framely makes them look launch-ready.</div>
  <div class="compare">
    <div class="side">
      <div class="side-tag tag-before">BEFORE</div>
      <div class="canvas canvas-before">
        <div class="raw">
          <div class="raw-chrome"><div class="raw-dot"></div><div class="raw-dot"></div><div class="raw-dot"></div></div>
          <div class="raw-content">
            <div class="raw-line s"></div>
            <div class="raw-line l"></div><div class="raw-line m"></div><div class="raw-line l"></div>
            <div class="raw-line m"></div><div class="raw-line l"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="arrow">→</div>
    <div class="side">
      <div class="side-tag tag-after">AFTER · 1 CLICK</div>
      <div class="canvas canvas-after bg-mint-lavender">
        <div class="frame">
          <div class="chrome"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="url"></div></div>
          <div class="after-content">
            <div class="raw-line s"></div>
            <div class="raw-line l"></div><div class="raw-line m"></div><div class="raw-line l"></div>
            <div class="raw-line m"></div><div class="raw-line l"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="tagline">Open-source · <b>Privacy-first</b> · No accounts · No uploads</div>
</body></html>
