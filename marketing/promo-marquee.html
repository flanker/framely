<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css">
<style>
body { width: 1400px; height: 560px; background: linear-gradient(135deg, #0b0d12 0%, #1a1d28 100%); padding: 0; }
.wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 80px; position: relative; overflow: hidden; }
/* glow */
.glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(140px); opacity: 0.45; }
.glow-1 { background: #86efac; left: -120px; top: -100px; }
.glow-2 { background: #c084fc; right: -120px; bottom: -100px; }
.left { position: relative; z-index: 2; max-width: 600px; }
.brand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.brand-row img { width: 44px; height: 44px; border-radius: 11px; box-shadow: 0 8px 18px rgba(0,0,0,0.4); }
.brand-row .n { font-weight: 800; font-size: 26px; color: #fff; letter-spacing: -0.5px; }
.title { font-size: 56px; font-weight: 800; color: #fff; line-height: 1.05; letter-spacing: -1.5px; }
.title em { font-style: normal; background: linear-gradient(135deg, #86efac, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
.sub { margin-top: 16px; font-size: 19px; color: #94a3b8; line-height: 1.5; max-width: 540px; }
.cta-row { margin-top: 32px; display: flex; align-items: center; gap: 16px; }
.cta { background: linear-gradient(135deg, #86efac, #c084fc); color: #0f172a; padding: 14px 24px; border-radius: 12px; font-size: 16px; font-weight: 700; letter-spacing: 0.1px; box-shadow: 0 12px 28px rgba(168,85,247,0.4); }
.note { font-size: 13px; color: #64748b; }
.right { position: relative; z-index: 2; }
/* stacked frames */
.stack { position: relative; width: 540px; height: 380px; }
.stack-card { position: absolute; padding: 22px; border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.stack-card .frame { width: 100%; height: 100%; }
.stack-card .mini-mock { padding: 18px 22px; height: 100%; display: flex; flex-direction: column; }
.stack-card .h1 { font-size: 18px; font-weight: 800; color: #0f172a; letter-spacing: -0.4px; margin-bottom: 8px; }
.stack-card .ll { height: 7px; border-radius: 3px; background: #e2e8f0; margin-bottom: 6px; }
.stack-card .ll.l { width: 100%; }
.stack-card .ll.m { width: 72%; }
.stack-card .ll.s { width: 50%; background: #cbd5e1; }
.s-1 { width: 380px; height: 240px; left: 0; top: 110px; transform: rotate(-6deg); }
.s-1 .frame { background: #fff; border-radius: 8px; overflow: hidden; }
.s-2 { width: 420px; height: 280px; right: 0; top: 0; transform: rotate(4deg); z-index: 2; }
.s-2 .frame { background: #fff; border-radius: 8px; overflow: hidden; }
</style></head>
<body>
  <div class="wrap">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="left">
      <div class="brand-row"><img src="icon.png"><span class="n">Framely</span></div>
      <div class="title">Beautiful screenshots, <em>in one click</em>.</div>
      <div class="sub">Wrap any page in a polished browser frame and a stunning gradient. No editor. No upload. Just click.</div>
      <div class="cta-row">
        <div class="cta">Add to Chrome — Free</div>
        <div class="note">Open-source · Privacy-first</div>
      </div>
    </div>
    <div class="right">
      <div class="stack">
        <div class="stack-card s-1 bg-sunset">
          <div class="frame">
            <div class="chrome"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="url"></div></div>
            <div class="mini-mock">
              <div class="h1">Bloom Florals</div>
              <div class="ll s"></div><div class="ll l"></div><div class="ll m"></div><div class="ll l"></div>
            </div>
          </div>
        </div>
        <div class="stack-card s-2 bg-mint-lavender">
          <div class="frame">
            <div class="chrome"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="url"></div></div>
            <div class="mini-mock">
              <div class="h1">Ship faster with delightful tools.</div>
              <div class="ll s"></div><div class="ll l"></div><div class="ll m"></div><div class="ll l"></div><div class="ll m"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body></html>
